<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alpha AI 🤖</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: white;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 15px;
            text-align: center;
            color: #4CAF50;
            font-weight: bold;
            font-size: 20px;
            background: #000;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
        }

        /* The Chat Area */
        #chatBox {
            flex: 1;
            overflow-y: auto;
            padding: 70px 15px 90px 15px; /* Added padding to clear the fixed header and footer */
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 16px;
        }
        .user-msg { align-self: flex-end; background: #4CAF50; color: white; border-bottom-right-radius: 2px; }
        .ai-msg { align-self: flex-start; background: #222; color: #eee; border-bottom-left-radius: 2px; }

        /* THE RIGID BOTTOM BAR */
        .input-area {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            padding: 15px;
            gap: 10px;
            background: #000;
            border-top: 1px solid #222;
            z-index: 100;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #444;
            background: #fff;
            color: #000;
            font-size: 16px;
        }

        button {
            padding: 12px 15px;
            background: #4CAF50;
            border: none;
            color: white;
            border-radius: 10px;
            font-weight: bold;
        }

        .mic-btn { background: #1b5e20; }
    </style>
</head>
<body>

    <header>Alpha AI 🤖</header>
    
    <div id="chatBox">
        <div class="message ai-msg">Hello! I am Alpha AI. How can I assist you today?</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask me anything...">
        <button onclick="sendMessage()">Send</button>
        <button class="mic-btn">🎤</button>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user-msg');
            userInput.value = '';

            try {
                const response = await fetch('https://my-ai-bot-production-8ff8.up.railway.app/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                const data = await response.json();
                appendMessage(data.reply, 'ai-msg');
            } catch (err) {
                appendMessage("Server error. Check Railway connection.", 'ai-msg');
            }
        }

        function appendMessage(text, className) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${className}`;
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        userInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
