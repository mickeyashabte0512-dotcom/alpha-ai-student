<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <title>Alpha AI Student</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000000;
            color: #ececec;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        header {
            padding: 10px;
            text-align: center;
            background: #000000;
            border-bottom: 1px solid #2d2d2d;
            font-size: 16px;
            font-weight: 600;
            color: #b4b4b4;
        }
        #chatBox {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 120px; 
            scroll-behavior: smooth;
        }
        .inputArea {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            background: linear-gradient(transparent, #000000 40%);
            z-index: 100;
        }
        .input-container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            background: #2f2f2f;
            border-radius: 30px;
            padding: 5px 10px;
            gap: 5px;
            border: 1px solid #424242;
        }
        .action-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 50%;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            flex-shrink: 0;
        }
        input#userInput {
            flex: 1;
            min-width: 0;
            padding: 10px;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 16px;
        }
        .send-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: none;
            background: #ffffff;
            color: #000000;
            font-weight: bold;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .msg { max-width: 85%; line-height: 1.5; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .user { align-self: flex-end; background: #2f2f2f; padding: 12px 18px; border-radius: 20px; }
        .bot { align-self: flex-start; color: #d1d1d1; }
        .bot::before { content: "Alpha:"; font-weight: bold; color: #10a37f; display: block; margin-bottom: 5px; }
        .img-preview { max-width: 150px; border-radius: 10px; margin-top: 5px; border: 1px solid #424242; }
    </style>
</head>
<body>

<header>Alpha AI Student</header>
<div id="chatBox"></div>

<div class="inputArea">
    <div class="input-container">
        <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="previewImage(this)">
        <button class="action-btn" onclick="document.getElementById('fileInput').click()">📷</button>
        <input id="userInput" placeholder="Message Alpha AI..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button class="action-btn" onclick="startVoice()">🎤</button>
        <button class="send-btn" onclick="sendMessage()">✔️</button>
    </div>
</div>

<script>
    const API_URL = "https://my-ai-bot-production-8ff8.up.railway.app/chat";
    const chatBox = document.getElementById("chatBox");
    let selectedImageBase64 = null;
    let memory = [{ role: "system", content: "You are Alpha AI, created by Mickey." }];

    // --- FIX: IMPROVED TYPEWRITER FOR TYPING EFFECT ---
    function typeWriter(text, container) {
        let i = 0;
        container.innerHTML = "";
        function type() {
            if (i < text.length) {
                container.innerHTML += text.charAt(i);
                i++;
                chatBox.scrollTop = chatBox.scrollHeight;
                setTimeout(type, 15); // Adjust typing speed here
            }
        }
        type();
    }

    // AI Greeting on load
    window.onload = () => {
        const botDiv = document.createElement("div");
        botDiv.className = "msg bot";
        chatBox.appendChild(botDiv);
        typeWriter("Hello! How can I help you today?", botDiv);
    };

    function previewImage(input) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                selectedImageBase64 = e.target.result.split(',')[1];
                chatBox.innerHTML += `<div class="msg user"><img src="${e.target.result}" class="img-preview"><br><i>Photo attached!</i></div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            };
            reader.readAsDataURL(file);
        }
    }

    function sendMessage() {
        const inputEl = document.getElementById("userInput");
        const text = inputEl.value.trim();
        
        if (!text && !selectedImageBase64) return;

        // --- LOCAL IDENTITY OVERRIDE (Mickey credit) ---
        const lowerText = text.toLowerCase();
        const identityWords = ["who", "name", "made", "develop", "creator", "student", "srudent"];
        const isIdentityQuery = identityWords.some(word => lowerText.includes(word));

        if (isIdentityQuery && !selectedImageBase64) {
            chatBox.innerHTML += `<div class="msg user">${text}</div>`;
            inputEl.value = "";
            const botDiv = document.createElement("div");
            botDiv.className = "msg bot";
            chatBox.appendChild(botDiv);
            typeWriter("I was developed and created by Mickey.", botDiv);
            return;
        }

        // Show user message
        if (text) chatBox.innerHTML += `<div class="msg user">${text}</div>`;
        inputEl.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;

        const payload = { 
            history: memory, 
            message: text || "What is in this image?", 
            image: selectedImageBase64 
        };
        
        selectedImageBase64 = null; // Clear image for next turn

        fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(data => {
            const reply = data.reply || "Connection lost. 😢";
            memory.push({ role: "user", content: text || "[Image]" }, { role: "assistant", content: reply });
            
            const botDiv = document.createElement("div");
            botDiv.className = "msg bot";
            chatBox.appendChild(botDiv);
            
            // --- FIX: Call typeWriter for the server reply ---
            typeWriter(reply, botDiv);
        })
        .catch(() => {
            const errDiv = document.createElement("div");
            errDiv.className = "msg bot";
            errDiv.innerText = "Server error. Check your Railway logs.";
            chatBox.appendChild(errDiv);
        });
    }

    function startVoice() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = "en-US";
        recognition.start();
        recognition.onresult = (e) => { 
            document.getElementById("userInput").value = e.results[0][0].transcript; 
            sendMessage();
        };
    }
</script>
</body>
</html>
