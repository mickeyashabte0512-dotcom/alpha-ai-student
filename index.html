<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <title>Alpha AI Student</title>

    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000000;
            color: #ececec;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        header {
            padding: 10px;
            text-align: center;
            background: #000000;
            border-bottom: 1px solid #2d2d2d;
            font-size: 16px;
            font-weight: 600;
            color: #b4b4b4;
        }
        #chatBox {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 100px; 
            scroll-behavior: smooth;
        }
        .inputArea {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            background: linear-gradient(transparent, #000000 40%);
        }
        /* FIXED CONTAINER: Keeps buttons from falling off the screen */
        .input-container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            background: #2f2f2f;
            border-radius: 30px;
            padding: 5px 10px;
            gap: 5px;
            border: 1px solid #424242;
        }
        .action-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            flex-shrink: 0; /* Prevents button from disappearing */
        }
        input#userInput {
            flex: 1;
            min-width: 0; /* Allows input to shrink so buttons fit */
            padding: 8px;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 15px;
        }
        .send-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: none;
            background: #ffffff;
            color: #000000;
            font-weight: bold;
            cursor: pointer;
            flex-shrink: 0;
        }
        .msg { max-width: 85%; line-height: 1.5; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .user { align-self: flex-end; background: #2f2f2f; padding: 10px 15px; border-radius: 18px; }
        .bot { align-self: flex-start; color: #d1d1d1; }
        .bot::before { content: "Alpha:"; font-weight: bold; color: #10a37f; display: block; }
        .img-preview { max-width: 150px; border-radius: 8px; margin-top: 5px; }
    </style>
</head>
<body>

<header>Alpha AI Student</header>
<div id="chatBox"><div class="msg bot">Ready to help, Mickey! Send a question or a photo.</div></div>

<div class="inputArea">
    <div class="input-container">
        <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="previewImage(this)">
        <button class="action-btn" onclick="document.getElementById('fileInput').click()">📷</button>
        
        <input id="userInput" placeholder="Message Alpha AI..." onkeypress="if(event.key==='Enter') sendMessage()">

        <button class="action-btn" onclick="startVoice()">🎤</button>
        <button class="send-btn" onclick="sendMessage()">✔️</button>
    </div>
</div>

<script>
    const API_URL = "https://my-ai-bot-production-8ff8.up.railway.app/chat";
    const chatBox = document.getElementById("chatBox");
    let selectedImageBase64 = null;
    let memory = [{ role: "system", content: "You are Alpha AI, created by Mickey. Be helpful and concise." }];

    function previewImage(input) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                selectedImageBase64 = e.target.result.split(',')[1];
                chatBox.innerHTML += `<div class="msg user"><img src="${e.target.result}" class="img-preview"><br><i>Photo attached!</i></div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            };
            reader.readAsDataURL(file);
        }
    }

    function sendMessage() {
        const inputEl = document.getElementById("userInput");
        const text = inputEl.value.trim();
        if (!text && !selectedImageBase64) return;

        // Mickey Identity Guard
        if (text.toLowerCase().includes("who made") || text.toLowerCase().includes("srudent")) {
            const botMsg = "I was created by "Mickey" for a student project!";
            chatBox.innerHTML += `<div class="msg user">${text}</div><div class="msg bot">${botMsg}</div>`;
            inputEl.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;
            return;
        }

        if (text) chatBox.innerHTML += `<div class="msg user">${text}</div>`;
        inputEl.value = "";

        const payload = { history: memory, message: text || "What is in this image?", image: selectedImageBase64 };
        selectedImageBase64 = null; // Clear image immediately to prevent double sending

        fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(data => {
            const reply = data.reply || "I'm having trouble connecting to the server.";
            memory.push({ role: "user", content: text || "[Image]" }, { role: "assistant", content: reply });
            const botDiv = document.createElement("div");
            botDiv.className = "msg bot";
            botDiv.innerHTML = marked.parse(reply);
            chatBox.appendChild(botDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        })
        .catch(() => {
            chatBox.innerHTML += `<div class="msg bot">Server error. Check your Railway logs.</div>`;
        });
    }

    function startVoice() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = "en-US";
        recognition.start();
        recognition.onresult = (e) => { document.getElementById("userInput").value = e.results[0][0].transcript; };
    }
</script>
</body>
</html>
