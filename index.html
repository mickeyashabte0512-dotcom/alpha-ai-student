<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Alpha AI 🤖</title>
  <style>
    /* 1. RESET & BASE STYLES */
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #000;
      color: #fff;
      display: flex;
      justify-content: center; /* Centers on Desktop */
      height: 100vh;
      overflow: hidden;
    }

    /* 2. THE MAIN WRAPPER (Desktop vs Mobile) */
    .app-container {
      width: 100%;
      max-width: 500px; /* Keeps it looking like a phone on PC */
      height: 100%;
      background-color: #0f0f0f;
      display: flex;
      flex-direction: column;
      border-left: 1px solid #222;
      border-right: 1px solid #222;
    }

    /* 3. HEADER */
    header {
      padding: 15px;
      text-align: center;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      font-size: 1.2rem;
      font-weight: bold;
      color: #4CAF50; /* Tech Green */
    }

    /* 4. CHAT BOX AREA */
    #chatBox {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      scrollbar-width: thin;
    }

    .message {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 18px;
      line-height: 1.4;
      font-size: 15px;
      word-wrap: break-word;
    }

    .user-msg {
      align-self: flex-end;
      background: #4CAF50;
      color: white;
      border-bottom-right-radius: 2px;
    }

    .ai-msg {
      align-self: flex-start;
      background: #2a2a2a;
      color: #eee;
      border-bottom-left-radius: 2px;
      border: 1px solid #333;
    }

    /* 5. INPUT AREA */
    .input-area {
      padding: 15px;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      gap: 10px;
      border-top: 1px solid #333;
    }

    input {
      flex: 1;
      background: #252525;
      border: 1px solid #444;
      padding: 12px 15px;
      border-radius: 25px;
      color: white;
      outline: none;
      font-size: 16px; /* Prevents mobile zoom */
    }

    input:focus { border-color: #4CAF50; }

    button {
      background: #4CAF50;
      border: none;
      color: white;
      padding: 10px 18px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
    }

    .mic-btn {
      background: #333;
      font-size: 1.2rem;
      padding: 8px 12px;
    }

    .mic-active {
      background: #ff4444 !important;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="app-container">
    <header>Alpha AI 🤖</header>
    
    <div id="chatBox">
      <div class="message ai-msg">Hello! I am Alpha AI. How can I assist you today?</div>
    </div>

    <div class="input-area">
      <button class="mic-btn" id="micBtn">🎤</button>
      <input type="text" id="userInput" placeholder="Ask me anything..." autocomplete="off">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const micBtn = document.getElementById('micBtn');

    // --- 1. SEND MESSAGE TO RAILWAY ---
    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      appendMessage(text, 'user-msg');
      userInput.value = '';

      try {
        // REPLACE THE LINK BELOW WITH YOUR RAILWAY URL
        const response = await fetch('https://your-railway-link.up.railway.app/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });

        const data = await response.json();
        appendMessage(data.reply, 'ai-msg');
        speakText(data.reply); // Optional: Makes AI talk back
      } catch (err) {
        appendMessage("Error: Could not connect to server.", 'ai-msg');
      }
    }

    function appendMessage(text, className) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${className}`;
      msgDiv.innerText = text;
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    // --- 2. VOICE OUTPUT (AI Talking) ---
    function speakText(text) {
      const speech = new SpeechSynthesisUtterance(text);
      speech.rate = 1.0;
      window.speechSynthesis.speak(speech);
    }

    // --- 3. SPEECH TO TEXT (Microphone) ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
      const recognition = new SpeechRecognition();
      
      micBtn.onclick = () => {
        recognition.start();
        micBtn.classList.add('mic-active');
      };

      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        userInput.value = transcript;
        micBtn.classList.remove('mic-active');
        sendMessage();
      };

      recognition.onerror = () => micBtn.classList.remove('mic-active');
    } else {
      micBtn.style.display = 'none'; // Hide mic if browser doesn't support it
    }

    // Allow "Enter" key to send
    userInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
