<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Alpha AI 🤖</title>
  <style>
    /* Keeps your exact look and placement */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%; /* Fixes the 'under screen' issue */
      background-color: #000;
      font-family: Arial, sans-serif;
      overflow: hidden; /* Stops the screen from shaking */
    }

    .app-container {
      display: flex;
      flex-direction: column;
      height: 100%; /* Fits exactly in the viewable area */
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
    }

    header {
      padding: 15px;
      text-align: center;
      color: #4CAF50;
      font-weight: bold;
      font-size: 20px;
    }

    #chatBox {
      flex: 1; /* Takes up all space between header and buttons */
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Your Original Message Bubbles */
    .message {
      max-width: 80%;
      padding: 10px 15px;
      border-radius: 15px;
      font-size: 16px;
    }
    .user-msg { align-self: flex-end; background: #4CAF50; color: white; }
    .ai-msg { align-self: flex-start; background: #222; color: #eee; }

    /* Your Original Button Placement */
    .input-area {
      display: flex;
      padding: 10px;
      gap: 8px;
      background: #000;
      align-items: center;
      margin-bottom: 5px; /* Tiny gap to stay above phone home buttons */
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #444;
      background: #fff;
      color: #000;
      font-size: 16px;
    }

    button {
      padding: 12px;
      background: #4CAF50;
      border: none;
      color: white;
      border-radius: 10px;
      font-weight: bold;
    }

    .mic-btn { background: #1b5e20; }
  </style>
</head>
<body>

  <div class="app-container">
    <header>Alpha AI 🤖</header>
    <div id="chatBox">
      <div class="message ai-msg">Hello! I am Alpha AI. How can I assist you today?</div>
    </div>

    <div class="input-area">
      <input type="text" id="userInput" placeholder="Ask me anything...">
      <button onclick="sendMessage()">Send</button>
      <button class="mic-btn" id="micBtn">🎤</button>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      appendMessage(text, 'user-msg');
      userInput.value = '';

      try {
        // !!! MAKE SURE TO PUT YOUR RAILWAY LINK HERE !!!
        const response = await fetch('https://your-railway-link.up.railway.app/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });

        const data = await response.json();
        appendMessage(data.reply, 'ai-msg');
      } catch (err) {
        appendMessage("Server error. Check Railway connection.", 'ai-msg');
      }
    }

    function appendMessage(text, className) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${className}`;
      msgDiv.innerText = text;
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    userInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
