<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>Alpha AI For Student </title>

    <style>
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000000;
            color: #ececec;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 10px;
            text-align: center;
            background: #000000;
            border-bottom: 1px solid #2d2d2d;
            font-size: 16px;
            font-weight: 600;
            color: #b4b4b4;
            z-index: 10;
        }

        #chatBox {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 120px; 
        }

        .inputArea {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background: linear-gradient(transparent, #000000 30%);
            z-index: 20;
        }

        .input-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            align-items: center;
            background: #2f2f2f;
            border-radius: 26px;
            padding: 6px 12px;
            gap: 8px;
            border: 1px solid #424242;
        }

        input {
            flex: 1;
            padding: 10px;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 16px;
        }

        button {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: #ffffff;
            color: #000000;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* FIXES HOW TABLES AND LISTS LOOK IN THE BOT REPLY */
        .bot table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 14px; }
        .bot th, .bot td { border: 1px solid #424242; padding: 8px; text-align: left; }
        .bot th { background: #1e1e1e; }
        .bot p { margin: 5px 0; }
        .bot ul { padding-left: 20px; }

        .msg {
            max-width: 90%;
            font-size: 16px;
            line-height: 1.6;
            word-wrap: break-word;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .user { align-self: flex-end; background: #2f2f2f; padding: 12px 18px; border-radius: 20px; }
        .bot { align-self: flex-start; color: #d1d1d1; }
        .bot::before { content: "Alpha:"; font-weight: bold; color: #10a37f; display: block; margin-bottom: 5px; }

        .typing { font-style: italic; opacity: 0.5; font-size: 14px; }
        .background-logo {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 280px; /* Perfect size for the screen */
    z-index: -1;
    pointer-events: none;
    filter: brightness(0.6) opacity(0.2);
}

.background-logo img {
    width: 100%;
    height: auto;
}

    </style>
</head>
<body>
    <div class="background-logo">
    <img src="IMG_20260423_193409_996.jpg" alt="Alpha Logo">
</div>


<header>Alpha AI Student</header>

<div id="chatBox">
    <div class="msg bot">How can I help you today?</div>
</div>

<div class="inputArea">
    <div class="input-container">
        <button style="background:#424242;color:white;" onclick="startVoice()">🎤</button>
        <input id="userInput" placeholder="Message Alpha AI..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">✔️</button>
    </div>
</div>

<script>
    // AUTO-HIDE ADDRESS BAR
    window.addEventListener("load", function() {
        setTimeout(function() { window.scrollTo(0, 1); }, 0);
    });

    const API_URL = "https://my-ai-bot-production-8ff8.up.railway.app/chat";
    let chatBox = document.getElementById("chatBox");

    function sendMessage() {
        let inputEl = document.getElementById("userInput");
        let input = inputEl.value.trim();
        if (!input) return;

        chatBox.innerHTML += `<div class="msg user">${input}</div>`;
        inputEl.value = "";
        
        let typingDiv = document.createElement("div");
        typingDiv.className = "msg bot typing";
        typingDiv.id = "typing";
        typingDiv.innerText = "Thinking...";
        chatBox.appendChild(typingDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: input })
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById("typing")?.remove();
            
            // THE ALIGNMENT FIX
            let rawReply = data.reply || "Connection lost. 😢";
            let formattedReply = marked.parse(rawReply); 

            chatBox.innerHTML += `<div class="msg bot">${formattedReply}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        })
        .catch(() => {
            document.getElementById("typing")?.remove();
            chatBox.innerHTML += `<div class="msg bot">Error reaching server.</div>`;
        });
    }

    function startVoice() {
        let SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) return alert("Voice not supported.");
        let recognition = new SpeechRecognition();
        recognition.lang = "en-US";
        recognition.start();
        recognition.onresult = (event) => {
            document.getElementById("userInput").value = event.results[0][0].transcript;
            sendMessage();
        };
    }
</script>

</body>
</html>
