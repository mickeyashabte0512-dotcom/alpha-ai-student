<!DOCTYPE html>
<html>
<head>
  <title>Alpha AI Student 🤖</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 15px;
      text-align: center;
      background: #1e293b;
      font-size: 18px;
      font-weight: bold;
    }

    #chatBox {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 75%;
      padding: 10px;
      border-radius: 12px;
      word-wrap: break-word;
    }

    .user {
      background: #22c55e;
      align-self: flex-end;
    }

    .bot {
      background: #334155;
      align-self: flex-start;
    }

    .typing {
      font-style: italic;
      opacity: 0.7;
    }

    .inputArea {
      display: flex;
      padding: 10px;
      background: #1e293b;
      gap: 5px;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px 12px;
      border-radius: 10px;
      border: none;
      background: #22c55e;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>Alpha AI Student 🤖</header>

<div id="chatBox"></div>

<div class="inputArea">
  <button onclick="startVoice()">🎤</button>
  <input id="userInput" placeholder="Ask anything...">
  <button onclick="sendMessage()">Send</button>
</div>

<script>

const API_URL = "https://my-ai-bot-production-8ff8.up.railway.app/chat";

// 💬 Chat memory
let messages = [];

function sendMessage() {

  let inputEl = document.getElementById("userInput");
  let chatBox = document.getElementById("chatBox");

  let input = inputEl.value.trim();
  if (!input) return;

  chatBox.innerHTML += `<div class="msg user">${input}</div>`;
  inputEl.value = "";

  // typing indicator
  let typingDiv = document.createElement("div");
  typingDiv.className = "msg bot typing";
  typingDiv.id = "typing";
  typingDiv.innerText = "AI is typing...";
  chatBox.appendChild(typingDiv);

  chatBox.scrollTop = chatBox.scrollHeight;

  // save message
  messages.push({ role: "user", content: input });

  fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message: input, history: messages })
  })
  .then(res => res.json())
  .then(data => {

    document.getElementById("typing")?.remove();

    let reply = data.reply || "No response 😢";

    chatBox.innerHTML += `<div class="msg bot">${reply}</div>`;

    chatBox.scrollTop = chatBox.scrollHeight;

    // save AI reply
    messages.push({ role: "assistant", content: reply });
  })
  .catch(() => {

    document.getElementById("typing")?.remove();

    chatBox.innerHTML += `<div class="msg bot">Server error 😢</div>`;
  });
}

// 🎤 Voice input
function startVoice() {
  let SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    alert("Voice not supported");
    return;
  }

  let recognition = new SpeechRecognition();
  recognition.lang = "en-US";

  recognition.start();

  recognition.onresult = (event) => {
    let text = event.results[0][0].transcript;
    document.getElementById("userInput").value = text;
    sendMessage();
  };
}

</script>

</body>
</html>
